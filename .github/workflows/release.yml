name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: linux-x86_64
            use_cross: true

          - name: linux-aarch64-musl
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_name: linux-aarch64
            use_cross: true

          - name: macos-x86_64
            os: macos-15
            target: x86_64-apple-darwin
            asset_name: macos-x86_64
            use_cross: false

          - name: macos-aarch64
            os: macos-15
            target: aarch64-apple-darwin
            asset_name: macos-aarch64
            use_cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release -p remoterm-server"
          strip: true
          use-rust-cache: false

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --locked --release --target ${{ matrix.target }} -p remoterm-server

      - name: Package
        id: package
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          archive="remoterm_${version}_${{ matrix.asset_name }}.tar.gz"
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${archive}" remoterm-server
          cd dist
          sha256sum "${archive}" > "${archive}.sha256"
          echo "archive=dist/${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "{linux-*,macos-*}"
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          cat *.sha256 > checksums.txt

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Remoterm v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/checksums.txt
